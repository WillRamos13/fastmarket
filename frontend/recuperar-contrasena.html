<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña | FastMarket</title>
    <link rel="stylesheet" href="recuperar-contrasena.css">
    <link rel="stylesheet" href="qa-upgrade.css">
</head>

<body>

    <main id="recuperar-main">

        <section id="recuperar-card">

            <div id="recuperar-info">
                <h1>Recuperar contraseña</h1>
                <p>
Ingresa tu correo, solicita un código de seguridad y luego crea una nueva contraseña.
                </p>

                <div class="info-pasos">
                    <p>1. Solicitas un código por correo</p>
                    <p>2. Ingresas el código recibido</p>
                    <p>3. Cambias tu contraseña</p>
                </div>
            </div>

            <form id="form-recuperar">

                <h2>Cambiar contraseña</h2>

                <label for="correo">Correo registrado</label>
                <input type="email" id="correo" placeholder="cliente@gmail.com">
                <button type="button" id="btn-enviar-codigo" class="btn-secundario-recuperar">Enviar código</button>

                <label for="codigo-verificacion">Código recibido</label>
                <input type="text" id="codigo-verificacion" maxlength="6" inputmode="numeric" placeholder="Código de 6 dígitos">

                <label for="nueva-password">Nueva contraseña</label>
                <input type="password" id="nueva-password" placeholder="Nueva contraseña">

                <label for="confirmar-password">Confirmar contraseña</label>
                <input type="password" id="confirmar-password" placeholder="Repite la contraseña">

                <button type="submit">Actualizar contraseña con código</button>

                <p id="mensaje-recuperar"></p>

                <div class="links">
                    <a href="login.html">Volver al login</a>
                    <a href="productos.html">Ir a productos</a>
                </div>

            </form>

        </section>

    </main>

    <script src="api.js"></script>
    <script src="recuperar-contrasena.js"></script>
</body>
</html>
