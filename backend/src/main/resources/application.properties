server.port=${PORT:8080}
spring.application.name=fastmarket-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fastmarket}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:*}

app.admin.nombre=${ADMIN_NOMBRE:Administrador}
app.admin.correo=${ADMIN_CORREO:admin@fastmarket.com}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.reset-password=${ADMIN_RESET_PASSWORD:true}

app.auth.secret=${APP_AUTH_SECRET:fastmarket-dev-secret-change-me}
app.auth.token-hours=${APP_AUTH_TOKEN_HOURS:12}

# OpenAI / Chatbot
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}

# Correo / verificacion por codigo
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:no-reply@fashmarket.local}
app.verificacion.codigo-minutos=${CODIGO_VERIFICACION_MINUTOS:10}
