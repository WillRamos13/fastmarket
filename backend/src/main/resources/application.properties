server.port=${PORT:8080}
spring.application.name=fastmarket-backend

spring.datasource.url=${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fastmarket}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://127.0.0.1:3000}

app.admin.nombre=${ADMIN_NOMBRE:Administrador}
app.admin.correo=${ADMIN_CORREO:admin@fastmarket.com}
app.admin.password=${ADMIN_PASSWORD:Cambia_Esta_Clave_Admin_2026!}
app.admin.reset-password=${ADMIN_RESET_PASSWORD:false}

app.auth.secret=${APP_AUTH_SECRET:NO_SECRET_CONFIGURED_CHANGE_ME_2026}
app.auth.token-hours=${APP_AUTH_TOKEN_HOURS:12}

# OpenAI / Chatbot
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}

# Correo / verificaciĂ³n por cĂ³digo con Resend API
# En Render configura:
# RESEND_API_KEY=re_tu_clave_real
# MAIL_FROM=FastMarket <onboarding@resend.dev>
resend.api.key=${RESEND_API_KEY:}
app.mail.from=${MAIL_FROM:FastMarket <onboarding@resend.dev>}
app.verificacion.codigo-minutos=${CODIGO_VERIFICACION_MINUTOS:10}
