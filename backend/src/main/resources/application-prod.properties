# Perfil de producción. Actívalo con SPRING_PROFILES_ACTIVE=prod en Render.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# No usar comodín (*) en producción.
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS}

# Obligatorio configurar secretos reales desde variables de entorno.
app.auth.secret=${APP_AUTH_SECRET}
app.admin.password=${ADMIN_PASSWORD}
