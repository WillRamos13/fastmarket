services:
  - type: web
    name: fashmarket-backend
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5500,http://127.0.0.1:5500
      - key: ADMIN_CORREO
        value: admin@fashmarket.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
