services:
  - type: web
    name: fastmarket-backend
    runtime: docker
    plan: free
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        sync: false
      - key: ADMIN_CORREO
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_RESET_PASSWORD
        value: false
      - key: APP_AUTH_SECRET
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: false
